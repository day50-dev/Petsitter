<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSitter Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header>
<div class="brand">
<img src="/static/petsitter-type.avif" alt="PetSitter">

</div>
<div class="nav">
<a href="https://github.com/day50-dev/Petsitter" target="_blank">GitHub</a>
<a href="/docs">API</a>
</div>
<div class="info">
<span><span class="label">Listening</span><span id="info-listen">--</span></span>
<span><span class="label">Upstream</span><span id="info-upstream">--</span></span>
<span><span class="label">Model</span><span id="info-model">--</span></span>
<span><span class="label">v</span><span id="info-version">--</span></span>
</div>
</header>

<div class="tabs">
<div class="tab active" data-tab="tricks" onclick="switchTab('tricks')">Tricks</div>
<div class="tab" data-tab="models" onclick="switchTab('models')">Models</div>
<div class="tab" data-tab="logs" onclick="switchTab('logs')">Logs</div>
</div>

<!-- === TRICKS TAB === -->
<div class="tab-pane active" id="tab-tricks">
<div class="ts-bar" id="ts-bar" style="display:none">
<div class="ts-pills" id="ts-pills"></div>
<div class="ts-filters">
<span onclick="editFilter(this,'X-Title')">X-Title: <span class="val" id="ts-fx">*</span></span>
<span onclick="editFilter(this,'Model')">Model: <span class="val" id="ts-fm">*</span></span>
</div>
</div>
<div class="two-col">
<div class="card">
<h2>Loaded Tricks</h2>
<div id="loaded-tricks"><div class="loader">Loading...</div></div>
</div>
<div class="card">
<h2>Available Tricks</h2>
<div id="available-tricks"><div class="loader">Loading...</div></div>
<div class="custom-path">
<input type="text" id="custom-path" placeholder="Path to trick .py file">
<button class="btn btn-neutral" onclick="loadCustomTrick()">Add</button>
</div>
</div>
</div>
</div>

<!-- === MODELS TAB === -->
<div class="tab-pane" id="tab-models">
<div class="card">
<h2>Default Model</h2>
<div class="model-entry" style="grid-template-columns:1fr 1fr auto">
<input type="text" id="model-url" placeholder="http://localhost:11434" style="font-size:13px">
<input type="text" id="model-name" placeholder="Model name (optional)" style="font-size:13px">
<button class="btn btn-primary btn-sm" onclick="updateDefaultModel()">Update</button>
</div>
</div>

<div class="card">
<div class="card-title"><h2>Configured Models</h2><span style="font-size:11px;color:#4a6572">MAS URIs for multi-model tricks</span></div>
<div class="models-grid" id="model-list"><div class="loader">Loading...</div></div>
<div class="model-add">
<input type="text" id="new-model-key" placeholder="key (e.g. thinker)" style="width:100px">
<input type="text" id="new-model-uri" placeholder="http://host#m=model-name" style="flex:1">
<button class="btn btn-success btn-sm" onclick="addModelEntry()">Add</button>
</div>
</div>
</div>

<!-- === LOGS TAB === -->
<div class="tab-pane" id="tab-logs">
<div class="card">
<div class="log-controls">
<h2 style="margin:0">Activity Log</h2>

<select id="level-filter" onchange="changeLogLevel()">
<option value="">All levels</option>
<option value="INFO">INFO</option>
<option value="DEBUG">DEBUG</option>
<option value="WARNING">WARNING</option>
<option value="ERROR">ERROR</option>
</select>
<button class="btn btn-secondary btn-sm" onclick="clearLogDisplay()">Clear</button>
<span class="log-count" id="log-count"></span>
</div>
<div class="log-viewer" id="log-viewer"><div class="loader">Loading logs...</div></div>
</div>
</div>

<script>
// ---- utils ----
function showToast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || r.statusText); }
  return r.json();
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---- tabs ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-'+name));
}

// ---- info ----
async function fetchInfo() {
    try {
      const d = await fetchJSON('/api/info');
      document.getElementById('info-listen').textContent = d.listen_on;
      document.getElementById('info-upstream').textContent = d.model_url;
      document.getElementById('info-model').textContent = d.model_name || '(default)';
      document.getElementById('info-version').textContent = d.version || '--';
    } catch(e) { console.error(e); }
  }

// ---- tricks ----
async function fetchTricks() {
  try {
    const all = await fetchJSON('/api/tricks');
    const tricks = all.filter(t => t.trickset === selectedTrickset);
    const el = document.getElementById('loaded-tricks');
    if (!tricks.length) { el.innerHTML = '<div class="empty">No tricks loaded for this trickset</div>'; return; }
    el.innerHTML = tricks.map(t => {
      const on = t.enabled !== false;
      const badges = [];
      if (t.keywords && t.keywords.length) badges.push(...t.keywords.map(k => '<span class="badge badge-kw">' + escapeHtml(k) + '</span>'));
      if (t.required_models && t.required_models.length) badges.push(...t.required_models.map(m => '<span class="badge badge-models">' + escapeHtml(m) + '</span>'));
      if (t.trickset && t.trickset !== '_default') badges.push('<span class="badge badge-ts">' + escapeHtml(t.trickset) + '</span>');
      return '<div class="trick-item"><div class="info"><div><span class="name">' + escapeHtml(t.display_name || t.name) + '</span><span class="path">' + escapeHtml(t.path || t.module) + '</span></div><div class="brief">' + escapeHtml(t.brief || '') + '</div><div class="trick-meta">' + badges.join('') + '</div></div><div class="actions"><button class="toggle ' + (on ? 'on' : 'off') + '" onclick="toggleTrick(\'' + t.name + '\',' + (!on) + ')" title="' + (on ? 'Disable' : 'Enable') + '">' + (on ? 'ON' : 'OFF') + '</button><button class="btn btn-danger btn-sm" onclick="unloadTrick(\'' + t.name + '\')" title="Remove">\u2715</button></div></div>';
    }).join('');
  } catch(e) { document.getElementById('loaded-tricks').innerHTML = '<div class="loader">Error loading tricks</div>'; }
}

async function toggleTrick(name, enabled) {
  try {
    const d = await fetchJSON('/api/tricks/' + encodeURIComponent(name) + '/toggle', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabled}) });
    showToast(name + ': ' + (d.enabled ? 'enabled' : 'disabled'));
    fetchTricks();
  } catch(e) { showToast(e.message, true); }
}

async function fetchAvailable() {
  try {
    const files = await fetchJSON('/api/tricks/available');
    const el = document.getElementById('available-tricks');
    if (!files.length) { el.innerHTML = '<div class="empty">No built-in tricks found</div>'; return; }
    el.innerHTML = files.map(f => '<div class="avail-item"><div><span class="name">' + escapeHtml(f.display_name || f.path) + '</span><span class="path">' + escapeHtml(f.path) + '</span>' + (f.brief ? '<div class="brief">' + escapeHtml(f.brief) + '</div>' : '') + '</div><button class="btn btn-neutral btn-sm" onclick="loadTrick(\'' + f.path.replace(/'/g, "\\'") + '\')">Load</button></div>').join('');
  } catch(e) { document.getElementById('available-tricks').innerHTML = '<div class="loader">Error loading</div>'; }
}

async function loadTrick(path) {
  try {
    const d = await fetchJSON('/api/tricks/load', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path, trickset: selectedTrickset}) });
    showToast('Loaded: ' + d.name);
    fetchTricks(); fetchAvailable();
  } catch(e) { showToast(e.message, true); }
}

async function loadCustomTrick() {
  const inp = document.getElementById('custom-path');
  const path = inp.value.trim();
  if (!path) return;
  await loadTrick(path);
  inp.value = '';
}

async function unloadTrick(name) {
  try {
    await fetchJSON('/api/tricks/unload', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
    showToast('Removed: ' + name);
    fetchTricks(); fetchAvailable();
  } catch(e) { showToast(e.message, true); }
}

// ---- tricksets ----
let selectedTrickset = '_default';
let loadedTricksets = {};

async function fetchTricksets() {
  try {
    const [loaded, avail] = await Promise.all([
      fetchJSON('/api/tricksets'),
      fetchJSON('/api/tricksets/available'),
    ]);
    loadedTricksets = {};
    loaded.forEach(ts => loadedTricksets[ts.name] = ts);
    const names = [...new Set([...loaded.map(ts => ts.name), ...avail.map(ts => ts.name)])];
    if (!names.includes(selectedTrickset) && names.length) selectedTrickset = names[0];
    const el = document.getElementById('ts-pills');
    el.innerHTML = names.map(n => {
      const isLoaded = !!loadedTricksets[n];
      return '<span class="pill' + (n === selectedTrickset ? ' active' : '') + (isLoaded ? '' : ' pill-unloaded') + '" data-name="' + n + '" onclick="switchTrickset(this.dataset.name)">' + escapeHtml(n) + '</span>';
    }).join('') + '<span class="pill pill-add" onclick="addTrickset()">+ Add</span>';
    if (names.length) switchTrickset(selectedTrickset);
  } catch(e) { console.error(e); }
}

async function switchTrickset(name) {
  selectedTrickset = name;
  document.querySelectorAll('#ts-pills .pill[data-name]').forEach(p => p.classList.toggle('active', p.dataset.name === name));
  const isLoaded = !!loadedTricksets[name];
  if (!isLoaded) {
    try {
      const avail = await fetchJSON('/api/tricksets/available');
      const info = avail.find(a => a.name === name);
      if (info) {
        await fetchJSON('/api/tricksets/load', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path: info.path}) });
        loadedTricksets[name] = (await fetchJSON('/api/tricksets/' + encodeURIComponent(name)));
        fetchTricksets();
      }
    } catch(e) {
      showToast(e.message, true);
      selectedTrickset = Object.keys(loadedTricksets)[0] || '_default';
      fetchTricksets();
    }
    return;
  }
  try {
    const ts = loadedTricksets[name];
    document.getElementById('ts-bar').style.display = '';
    document.getElementById('ts-fx').textContent = ts.filters['X-Title'] || '*';
    document.getElementById('ts-fm').textContent = ts.filters['Model'] || '*';
    fetchTricks();
  } catch(e) { console.error(e); }
}

function editFilter(el, key) {
  const valSpan = el.querySelector('.val') || el;
  const orig = valSpan.textContent;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = orig;
  inp.onblur = function() { saveFilter(valSpan, key, inp.value, orig, el); };
  inp.onkeydown = function(e) { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { valSpan.textContent = orig; } };
  valSpan.textContent = '';
  valSpan.appendChild(inp);
  inp.focus();
  inp.select();
}

async function saveFilter(valSpan, key, val, orig, parentEl) {
  valSpan.textContent = val || '*';
  try {
    const filters = {
      'X-Title': document.getElementById('ts-fx').textContent,
      'Model': document.getElementById('ts-fm').textContent,
      [key]: val || '*',
    };
    await fetchJSON('/api/tricksets/' + encodeURIComponent(selectedTrickset), {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({filters}),
    });
  } catch(e) { showToast(e.message, true); valSpan.textContent = orig; }
}

async function addTrickset() {
  const name = prompt('Enter trickset name:');
  if (!name) return;
  try {
    const d = await fetchJSON('/api/tricksets/create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, filters: {'X-Title': '*', 'Model': '*'}}),
    });
    showToast('Created: ' + d.name);
    selectedTrickset = name;
    fetchTricksets();
  } catch(e) { showToast(e.message, true); }
}

// ---- models ----
async function fetchModels() {
  try {
    const d = await fetchJSON('/api/models');
    document.getElementById('model-url').value = d.model_url || '';
    document.getElementById('model-name').value = d.model_name || '';

    const keys = Object.keys(d.configured_models || {});
    const el = document.getElementById('model-list');
    if (!keys.length) { el.innerHTML = '<div class="empty">No models configured</div>'; return; }
    el.innerHTML = keys.map(k => {
      const m = d.configured_models[k];
      return '<div class="model-entry"><span class="key">' + escapeHtml(k) + '</span><input type="text" value="' + escapeHtml(m.model_url) + '" onchange="updateModelKey(\'' + k + '\',\'url\',this.value)"><input type="text" value="' + escapeHtml(m.model_name) + '" onchange="updateModelKey(\'' + k + '\',\'name\',this.value)"><span class="rm" onclick="removeModelKey(\'' + k + '\')">&times;</span></div>';
    }).join('');
  } catch(e) { document.getElementById('model-list').innerHTML = '<div class="loader">Error loading models</div>'; }
}

async function updateDefaultModel() {
  try {
    await fetchJSON('/api/models', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
      model_url: document.getElementById('model-url').value,
      model_name: document.getElementById('model-name').value,
    })});
    showToast('Default model updated');
    fetchInfo();
  } catch(e) { showToast(e.message, true); }
}

async function addModelEntry() {
  const key = document.getElementById('new-model-key').value.trim();
  const uri = document.getElementById('new-model-uri').value.trim();
  if (!key || !uri) return;
  try {
    const d = await fetchJSON('/api/models', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({add_model: {key, uri}})});
    showToast('Added: ' + key);
    document.getElementById('new-model-key').value = '';
    document.getElementById('new-model-uri').value = '';
    fetchModels();
  } catch(e) { showToast(e.message, true); }
}

async function updateModelKey(key, field, value) {
  try {
    await fetchJSON('/api/models', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({update_model: {key, field, value}})});
  } catch(e) { showToast(e.message, true); }
}

async function removeModelKey(key) {
  try {
    await fetchJSON('/api/models', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({remove_model: key})});
    showToast('Removed: ' + key);
    fetchModels();
  } catch(e) { showToast(e.message, true); }
}

// ---- logs ----
let logEventSource = null;

function startLogStream() {
  if (logEventSource) logEventSource.close();
  const level = document.getElementById('level-filter').value;
  const url = '/api/logs' + (level ? '?level=' + encodeURIComponent(level) : '');
  const viewer = document.getElementById('log-viewer');
  let pending = 0;
  logEventSource = new EventSource(url);
  logEventSource.onmessage = function(e) {
    if (e.data && e.lastEventId === undefined && e.data.startsWith('{')) {
      try {
        const entry = JSON.parse(e.data);
        const atBottom = viewer.scrollHeight - viewer.scrollTop - viewer.clientHeight < 40;
        viewer.insertAdjacentHTML('beforeend', '<div class="log-entry lvl-' + entry.level + '"><span class="time">' + escapeHtml(entry.time) + '</span>' + escapeHtml(entry.level) + ': ' + escapeHtml(entry.message) + '</div>');
        pending++;
        document.getElementById('log-count').textContent = viewer.querySelectorAll('.log-entry').length + ' entries';
        if (atBottom) viewer.scrollTop = viewer.scrollHeight;
      } catch(_) {}
    }
  };
  logEventSource.onerror = function() {
    logEventSource.close();
    setTimeout(startLogStream, 3000);
  };
}

function changeLogLevel() {
  const viewer = document.getElementById('log-viewer');
  viewer.innerHTML = '';
  document.getElementById('log-count').textContent = '0 entries';
  startLogStream();
}

function clearLogDisplay() {
  if (logEventSource) logEventSource.close();
  document.getElementById('log-viewer').innerHTML = '';
  document.getElementById('log-count').textContent = '0 entries';
  setTimeout(startLogStream, 100);
}

// ---- init ----
fetchInfo(); fetchTricksets(); fetchAvailable(); fetchModels();
startLogStream();
</script>
</body>
</html>
